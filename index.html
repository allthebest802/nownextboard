<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Now &amp; Next — Helpset</title>
<meta name="description" content="A simple offline Now/Next/Then visual board for children. Free, no ads, no sign-up. From helpset.uk" />
<meta name="theme-color" content="#266e6e" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />

<!-- ============================================================
  NOW & NEXT — standalone offline-first board (Helpset)

  DEPLOYING:
  - Put these files in their own folder (or subdomain, e.g.
    app.helpset.uk): index.html, sw.js, manifest.webmanifest,
    icon-192.png, icon-512.png.
  - Must be served over HTTPS (Netlify: yes) for the service
    worker + install prompt to work.
  - To ship an update later: change CACHE_VERSION in sw.js.

  DESIGN NOTES:
  - No network requests after first load: system fonts, emoji
    card art, everything inline. Swap emoji for your Helpset
    SVGs later by editing BUILTIN_CARDS (give each an svg field
    and render it instead of the emoji span).
  - State lives in localStorage; custom photo cards in IndexedDB.
  - Child lock: tap the padlock to lock; press AND HOLD it for
    2 seconds to unlock.
============================================================ -->

<style>
  :root {
    --bg: #f6f3ec;
    --ink: #26333a;
    --ink-soft: #5b6a72;
    --teal: #266e6e;
    --teal-dark: #1c5555;
    --now: #f0a64a;      /* warm amber = happening now */
    --now-soft: #fdeeda;
    --next: #5b8fd6;     /* calm blue = coming next */
    --next-soft: #e4edf9;
    --then: #9b7fc7;     /* soft purple = after that */
    --then-soft: #efe9f8;
    --card: #ffffff;
    --radius: 20px;
    --shadow: 0 2px 10px rgba(38, 51, 58, 0.12);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  button { font: inherit; color: inherit; cursor: pointer; }

  :focus-visible {
    outline: 3px solid var(--teal);
    outline-offset: 3px;
    border-radius: 6px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 1rem;
  }

  .app-title {
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: 0.01em;
    margin: 0;
    color: var(--teal-dark);
    flex: 1;
  }

  .icon-btn {
    min-width: 48px;
    min-height: 48px;
    border: none;
    border-radius: 14px;
    background: #ffffff;
    box-shadow: var(--shadow);
    font-size: 1.35rem;
    line-height: 1;
    display: grid;
    place-items: center;
  }

  .icon-btn[aria-pressed="true"] { background: var(--teal); color: #fff; }

  /* ---------- Board ---------- */
  main {
    flex: 1;
    display: flex;
    gap: 0.8rem;
    padding: 0.4rem 1rem calc(1rem + env(safe-area-inset-bottom));
    align-items: stretch;
  }

  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-width: 0;
  }

  .panel-label {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-radius: 12px;
    padding: 0.35rem 0;
    color: #fff;
  }

  .panel--now  .panel-label { background: var(--now); }
  .panel--next .panel-label { background: var(--next); }
  .panel--then .panel-label { background: var(--then); }

  .slot {
    flex: 1;
    border: none;
    border-radius: var(--radius);
    background: var(--card);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.8rem;
    min-height: 200px;
    position: relative;
    overflow: hidden;
  }

  .panel--now  .slot { background: var(--now-soft); }
  .panel--next .slot { background: var(--next-soft); }
  .panel--then .slot { background: var(--then-soft); }

  .slot.empty {
    background: transparent;
    border: 3px dashed rgba(38, 51, 58, 0.25);
    box-shadow: none;
    color: var(--ink-soft);
    font-weight: 600;
  }

  .slot .emoji {
    font-size: clamp(3.5rem, 16vw, 7rem);
    line-height: 1.1;
  }

  .slot img.photo {
    width: min(100%, 220px);
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 16px;
  }

  .slot .card-label {
    font-size: clamp(1.05rem, 4vw, 1.5rem);
    font-weight: 700;
    text-align: center;
    overflow-wrap: anywhere;
  }

  .slot .hint { font-size: 0.85rem; font-weight: 500; }

  .done-btn {
    border: none;
    border-radius: 16px;
    background: var(--teal);
    color: #fff;
    font-size: 1.25rem;
    font-weight: 800;
    padding: 0.85rem 0;
    min-height: 56px;
    box-shadow: var(--shadow);
  }

  .done-btn:active { transform: scale(0.98); }

  .done-btn:disabled { opacity: 0.35; cursor: default; }

  /* Done celebration overlay on the NOW slot */
  .slot .tick {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: clamp(4rem, 20vw, 8rem);
    background: rgba(255, 255, 255, 0.85);
    opacity: 0;
    pointer-events: none;
  }

  .slot .tick.show { opacity: 1; }

  @media (prefers-reduced-motion: no-preference) {
    .slot .tick { transition: opacity 0.25s ease; }
    .slot .tick.show .tick-mark { animation: pop 0.45s ease; display: inline-block; }
    @keyframes pop {
      0% { transform: scale(0.3); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
  }

  /* ---------- Modals ---------- */
  dialog {
    border: none;
    border-radius: var(--radius);
    box-shadow: 0 10px 40px rgba(38, 51, 58, 0.3);
    padding: 1.2rem;
    width: min(560px, calc(100vw - 2rem));
    max-height: 85dvh;
    background: var(--bg);
    color: var(--ink);
  }

  dialog::backdrop { background: rgba(38, 51, 58, 0.45); }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }

  .modal-head h2 { margin: 0; font-size: 1.2rem; }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
    gap: 0.6rem;
  }

  .pick-card {
    border: none;
    border-radius: 14px;
    background: #fff;
    box-shadow: var(--shadow);
    padding: 0.6rem 0.3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    min-height: 96px;
  }

  .pick-card .emoji { font-size: 2.2rem; }

  .pick-card img {
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 10px;
  }

  .pick-card span.lbl {
    font-size: 0.78rem;
    font-weight: 600;
    text-align: center;
    overflow-wrap: anywhere;
  }

  .section-title {
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin: 1rem 0 0.5rem;
  }

  .wide-btn {
    width: 100%;
    border: none;
    border-radius: 14px;
    background: var(--teal);
    color: #fff;
    font-weight: 700;
    padding: 0.8rem;
    min-height: 52px;
    margin-top: 0.6rem;
  }

  .wide-btn.secondary { background: #fff; color: var(--ink); box-shadow: var(--shadow); }

  .wide-btn.danger { background: #b3453f; }

  /* Settings rows */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: #fff;
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
  }

  .setting-row label { font-weight: 600; }

  .setting-row input[type="checkbox"] { width: 26px; height: 26px; accent-color: var(--teal); }

  .manage-card {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    background: #fff;
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 0.5rem 0.7rem;
    margin-bottom: 0.5rem;
  }

  .manage-card img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }

  .manage-card .lbl { flex: 1; font-weight: 600; overflow-wrap: anywhere; }

  .manage-card button {
    border: none;
    background: #f3dedd;
    color: #7a2721;
    border-radius: 10px;
    min-width: 44px;
    min-height: 44px;
    font-size: 1.1rem;
  }

  .footer-note {
    text-align: center;
    font-size: 0.85rem;
    color: var(--ink-soft);
    margin-top: 1rem;
  }

  .footer-note a { color: var(--teal-dark); font-weight: 700; }

  /* Lock hold progress */
  #lockBtn { position: relative; }

  #lockBtn .hold-ring {
    position: absolute;
    inset: 4px;
    border-radius: 10px;
    border: 3px solid transparent;
  }

  #lockBtn.holding .hold-ring { border-color: #fff; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(1.2rem + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 0.6rem 1.1rem;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.9rem;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }

  .toast.show { opacity: 1; }

  @media (prefers-reduced-motion: no-preference) {
    .toast { transition: opacity 0.25s ease; }
  }

  /* Narrow screens: stack panels vertically if THEN is on */
  @media (max-width: 560px) {
    body.three-panels main { flex-direction: column; }
    body.three-panels .slot { min-height: 130px; }
  }
</style>
</head>
<body>

<header>
  <h1 class="app-title">Now &amp; Next</h1>
  <button id="lockBtn" class="icon-btn" aria-pressed="false"
          aria-label="Child lock. Tap to lock the board. Press and hold for two seconds to unlock.">
    <span id="lockIcon" aria-hidden="true">🔓</span>
    <span class="hold-ring" aria-hidden="true"></span>
  </button>
  <button id="settingsBtn" class="icon-btn" aria-label="Settings">
    <span aria-hidden="true">⚙️</span>
  </button>
</header>

<main id="board">
  <!-- Panels are rendered by JS -->
</main>

<!-- Card picker -->
<dialog id="picker" aria-labelledby="pickerTitle">
  <div class="modal-head">
    <h2 id="pickerTitle">Choose a card</h2>
    <button class="icon-btn" data-close="picker" aria-label="Close">✕</button>
  </div>
  <div class="section-title">Activities</div>
  <div id="builtinGrid" class="card-grid"></div>
  <div class="section-title">My photo cards</div>
  <div id="customGrid" class="card-grid"></div>
  <button id="addPhotoBtn" class="wide-btn secondary">📷 Add a photo card</button>
  <button class="wide-btn secondary" data-clear-slot>Clear this space</button>
  <input id="photoInput" type="file" accept="image/*" hidden />
</dialog>

<!-- Settings -->
<dialog id="settings" aria-labelledby="settingsTitle">
  <div class="modal-head">
    <h2 id="settingsTitle">Settings</h2>
    <button class="icon-btn" data-close="settings" aria-label="Close">✕</button>
  </div>

  <div class="setting-row">
    <label for="thenToggle">Show a third “Then” space</label>
    <input type="checkbox" id="thenToggle" />
  </div>

  <button id="installBtn" class="wide-btn" hidden>⬇️ Install this app</button>

  <div class="section-title">My photo cards</div>
  <div id="manageCards"></div>
  <p id="noCustomNote" class="footer-note">No photo cards yet — add one from the card picker.</p>

  <button id="clearBoardBtn" class="wide-btn secondary">Clear the board</button>
  <button id="resetBtn" class="wide-btn danger">Delete all photo cards</button>

  <p class="footer-note">
    Free from <a href="https://helpset.uk" rel="noopener">helpset.uk</a> —
    more visual support tools for families.<br />
    Works fully offline. Nothing you add ever leaves this device.
  </p>
</dialog>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
"use strict";

/* ============================================================
   Built-in card library (emoji for v1 — swap for Helpset SVGs
   later by adding an `svg` field and rendering it in makeCardEl)
============================================================ */
const BUILTIN_CARDS = [
  ["breakfast", "🥣", "Breakfast"],
  ["lunch", "🥪", "Lunch"],
  ["dinner", "🍽️", "Dinner"],
  ["snack", "🍎", "Snack"],
  ["drink", "🥤", "Drink"],
  ["teeth", "🪥", "Brush teeth"],
  ["toilet", "🚽", "Toilet"],
  ["bath", "🛁", "Bath"],
  ["wash", "🧼", "Wash hands"],
  ["dressed", "👕", "Get dressed"],
  ["shoes", "👟", "Shoes on"],
  ["coat", "🧥", "Coat on"],
  ["car", "🚗", "Car"],
  ["bus", "🚌", "Bus"],
  ["walk", "🚶", "Walk"],
  ["school", "🏫", "School"],
  ["home", "🏠", "Home"],
  ["park", "🛝", "Park"],
  ["shop", "🛒", "Shopping"],
  ["doctor", "🩺", "Doctor"],
  ["haircut", "💇", "Haircut"],
  ["play", "🧸", "Play"],
  ["tv", "📺", "TV"],
  ["tablet", "📱", "Tablet"],
  ["reading", "📖", "Story"],
  ["drawing", "🖍️", "Drawing"],
  ["music", "🎵", "Music"],
  ["quiet", "🤫", "Quiet time"],
  ["swim", "🏊", "Swimming"],
  ["friends", "🧑‍🤝‍🧑", "Friends"],
  ["grandma", "👵", "Grandma"],
  ["bed", "🛏️", "Bed"]
].map(([id, emoji, label]) => ({ id: "b:" + id, emoji, label }));

/* ============================================================
   State — persisted to localStorage on every change so the app
   reopens exactly as it was left.
============================================================ */
const STORE_KEY = "nnb-state-v1";

let state = {
  slots: { now: null, next: null, then: null }, // card ids or null
  showThen: false,
  locked: false
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) state = Object.assign(state, JSON.parse(raw));
  } catch (e) { /* corrupted state — start fresh */ }
}

function saveState() {
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

/* ============================================================
   IndexedDB — custom photo cards (blobs are too big for
   localStorage). One object store: { id, label, blob }.
============================================================ */
const DB_NAME = "nnb-photos";
let customCards = []; // { id, label, url } — url is an objectURL

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore("photos", { keyPath: "id" });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbAll() {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const req = db.transaction("photos").objectStore("photos").getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

async function idbPut(record) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("photos", "readwrite");
    tx.objectStore("photos").put(record);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function idbDelete(id) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction("photos", "readwrite");
    tx.objectStore("photos").delete(id);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

async function loadCustomCards() {
  const records = await idbAll();
  customCards = records.map((r) => ({
    id: r.id,
    label: r.label,
    url: URL.createObjectURL(r.blob)
  }));
}

/* Resize a chosen photo to max 512px square-ish JPEG so storage stays small */
function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const max = 512;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("resize failed")), "image/jpeg", 0.85);
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

/* ============================================================
   Card lookup
============================================================ */
function findCard(id) {
  if (!id) return null;
  return BUILTIN_CARDS.find((c) => c.id === id) || customCards.find((c) => c.id === id) || null;
}

/* ============================================================
   Board rendering
============================================================ */
const board = document.getElementById("board");
const PANELS = [
  { key: "now", label: "Now" },
  { key: "next", label: "Next" },
  { key: "then", label: "Then" }
];

function render() {
  document.body.classList.toggle("three-panels", state.showThen);
  board.innerHTML = "";

  PANELS.forEach((p) => {
    if (p.key === "then" && !state.showThen) return;

    const panel = document.createElement("div");
    panel.className = "panel panel--" + p.key;

    const label = document.createElement("div");
    label.className = "panel-label";
    label.textContent = p.label;
    panel.appendChild(label);

    const card = findCard(state.slots[p.key]);
    const slot = document.createElement("button");
    slot.className = "slot" + (card ? "" : " empty");
    slot.setAttribute("aria-label",
      card ? p.label + ": " + card.label + (state.locked ? "" : ". Tap to change.")
           : p.label + " space, empty." + (state.locked ? "" : " Tap to choose a card."));

    if (card) {
      if (card.url) {
        const img = document.createElement("img");
        img.className = "photo";
        img.src = card.url;
        img.alt = "";
        slot.appendChild(img);
      } else {
        const em = document.createElement("span");
        em.className = "emoji";
        em.setAttribute("aria-hidden", "true");
        em.textContent = card.emoji;
        slot.appendChild(em);
      }
      const lbl = document.createElement("span");
      lbl.className = "card-label";
      lbl.textContent = card.label;
      slot.appendChild(lbl);
    } else if (!state.locked) {
      const plus = document.createElement("span");
      plus.className = "emoji";
      plus.setAttribute("aria-hidden", "true");
      plus.textContent = "＋";
      slot.appendChild(plus);
      const hint = document.createElement("span");
      hint.className = "hint";
      hint.textContent = "Tap to choose";
      slot.appendChild(hint);
    }

    // Tick overlay for the done celebration (NOW only)
    if (p.key === "now") {
      const tick = document.createElement("span");
      tick.className = "tick";
      tick.id = "tickOverlay";
      tick.setAttribute("aria-hidden", "true");
      tick.innerHTML = '<span class="tick-mark">✅</span>';
      slot.appendChild(tick);
    }

    if (!state.locked) {
      slot.addEventListener("click", () => openPicker(p.key));
    } else {
      slot.disabled = false; // still focusable/readable, just inert
      slot.addEventListener("click", () => {});
    }

    panel.appendChild(slot);

    if (p.key === "now") {
      const done = document.createElement("button");
      done.className = "done-btn";
      done.id = "doneBtn";
      done.textContent = "Done ✓";
      done.disabled = !card;
      done.addEventListener("click", markDone);
      panel.appendChild(done);
    }

    board.appendChild(panel);
  });
}

/* Done: celebrate, then shift Next -> Now and Then -> Next */
let doneBusy = false;
function markDone() {
  if (doneBusy || !state.slots.now) return;
  doneBusy = true;
  const overlay = document.getElementById("tickOverlay");
  if (overlay) overlay.classList.add("show");
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  setTimeout(() => {
    state.slots.now = state.slots.next;
    state.slots.next = state.showThen ? state.slots.then : null;
    if (state.showThen) state.slots.then = null;
    saveState();
    render();
    doneBusy = false;
  }, reduced ? 150 : 650);
}

/* ============================================================
   Card picker
============================================================ */
const picker = document.getElementById("picker");
const builtinGrid = document.getElementById("builtinGrid");
const customGrid = document.getElementById("customGrid");
let pickerSlot = null;

function makePickEl(card) {
  const btn = document.createElement("button");
  btn.className = "pick-card";
  btn.setAttribute("aria-label", card.label);
  if (card.url) {
    const img = document.createElement("img");
    img.src = card.url;
    img.alt = "";
    btn.appendChild(img);
  } else {
    const em = document.createElement("span");
    em.className = "emoji";
    em.setAttribute("aria-hidden", "true");
    em.textContent = card.emoji;
    btn.appendChild(em);
  }
  const lbl = document.createElement("span");
  lbl.className = "lbl";
  lbl.textContent = card.label;
  btn.appendChild(lbl);
  btn.addEventListener("click", () => {
    state.slots[pickerSlot] = card.id;
    saveState();
    picker.close();
    render();
  });
  return btn;
}

function renderPickerGrids() {
  builtinGrid.innerHTML = "";
  BUILTIN_CARDS.forEach((c) => builtinGrid.appendChild(makePickEl(c)));
  customGrid.innerHTML = "";
  customCards.forEach((c) => customGrid.appendChild(makePickEl(c)));
  if (!customCards.length) {
    const none = document.createElement("p");
    none.className = "footer-note";
    none.style.gridColumn = "1 / -1";
    none.textContent = "Add a photo of a real place or person — familiar photos often work best.";
    customGrid.appendChild(none);
  }
}

function openPicker(slotKey) {
  pickerSlot = slotKey;
  document.getElementById("pickerTitle").textContent =
    "Choose a card for “" + (slotKey === "now" ? "Now" : slotKey === "next" ? "Next" : "Then") + "”";
  renderPickerGrids();
  picker.showModal();
}

document.querySelector("[data-clear-slot]").addEventListener("click", () => {
  state.slots[pickerSlot] = null;
  saveState();
  picker.close();
  render();
});

/* Add photo card */
const photoInput = document.getElementById("photoInput");
document.getElementById("addPhotoBtn").addEventListener("click", () => photoInput.click());

photoInput.addEventListener("change", async () => {
  const file = photoInput.files[0];
  photoInput.value = "";
  if (!file) return;
  let label = prompt("What should this card be called? (e.g. “Nanny’s house”)");
  if (label === null) return;
  label = label.trim().slice(0, 40) || "My card";
  try {
    const blob = await resizeImage(file);
    const id = "c:" + Date.now();
    await idbPut({ id, label, blob });
    customCards.push({ id, label, url: URL.createObjectURL(blob) });
    renderPickerGrids();
    toast("Photo card added");
  } catch (e) {
    toast("Sorry, that photo couldn’t be added");
  }
});

/* ============================================================
   Settings
============================================================ */
const settings = document.getElementById("settings");
const thenToggle = document.getElementById("thenToggle");
const manageCards = document.getElementById("manageCards");
const noCustomNote = document.getElementById("noCustomNote");

document.getElementById("settingsBtn").addEventListener("click", () => {
  if (state.locked) { toast("Board is locked — hold the padlock to unlock"); return; }
  thenToggle.checked = state.showThen;
  renderManageList();
  settings.showModal();
});

thenToggle.addEventListener("change", () => {
  state.showThen = thenToggle.checked;
  if (!state.showThen) state.slots.then = null;
  saveState();
  render();
});

function renderManageList() {
  manageCards.innerHTML = "";
  noCustomNote.hidden = customCards.length > 0;
  customCards.forEach((c) => {
    const row = document.createElement("div");
    row.className = "manage-card";
    const img = document.createElement("img");
    img.src = c.url; img.alt = "";
    const lbl = document.createElement("span");
    lbl.className = "lbl"; lbl.textContent = c.label;
    const del = document.createElement("button");
    del.setAttribute("aria-label", "Delete card: " + c.label);
    del.textContent = "🗑";
    del.addEventListener("click", async () => {
      await idbDelete(c.id);
      URL.revokeObjectURL(c.url);
      customCards = customCards.filter((x) => x.id !== c.id);
      Object.keys(state.slots).forEach((k) => { if (state.slots[k] === c.id) state.slots[k] = null; });
      saveState();
      renderManageList();
      render();
    });
    row.append(img, lbl, del);
    manageCards.appendChild(row);
  });
}

document.getElementById("clearBoardBtn").addEventListener("click", () => {
  state.slots = { now: null, next: null, then: null };
  saveState();
  render();
  toast("Board cleared");
});

document.getElementById("resetBtn").addEventListener("click", async () => {
  if (!confirm("Delete ALL photo cards? This can’t be undone.")) return;
  for (const c of customCards) { await idbDelete(c.id); URL.revokeObjectURL(c.url); }
  customCards = [];
  Object.keys(state.slots).forEach((k) => {
    if (state.slots[k] && state.slots[k].startsWith("c:")) state.slots[k] = null;
  });
  saveState();
  renderManageList();
  render();
});

/* Close buttons for both dialogs */
document.querySelectorAll("[data-close]").forEach((btn) => {
  btn.addEventListener("click", () => document.getElementById(btn.dataset.close).close());
});

/* ============================================================
   Child lock — tap to lock; press and hold 2s to unlock.
============================================================ */
const lockBtn = document.getElementById("lockBtn");
const lockIcon = document.getElementById("lockIcon");
let holdTimer = null;

function setLocked(v) {
  state.locked = v;
  saveState();
  lockIcon.textContent = v ? "🔒" : "🔓";
  lockBtn.setAttribute("aria-pressed", String(v));
  render();
  toast(v ? "Locked — hold the padlock for 2 seconds to unlock" : "Unlocked");
}

lockBtn.addEventListener("click", () => {
  if (!state.locked) setLocked(true);
  // when locked, click does nothing — unlocking requires the hold below
});

function startHold() {
  if (!state.locked) return;
  lockBtn.classList.add("holding");
  holdTimer = setTimeout(() => { lockBtn.classList.remove("holding"); setLocked(false); }, 2000);
}
function cancelHold() {
  lockBtn.classList.remove("holding");
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
}
lockBtn.addEventListener("pointerdown", startHold);
lockBtn.addEventListener("pointerup", cancelHold);
lockBtn.addEventListener("pointerleave", cancelHold);
// Keyboard escape hatch for the hold gesture
lockBtn.addEventListener("keydown", (e) => {
  if (state.locked && (e.key === "Enter" || e.key === " ")) {
    e.preventDefault();
    if (!holdTimer) startHold();
  }
});
lockBtn.addEventListener("keyup", cancelHold);

/* ============================================================
   Toast, install prompt, service worker
============================================================ */
const toastEl = document.getElementById("toast");
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2600);
}

let deferredInstall = null;
const installBtn = document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstall = e;
  installBtn.hidden = false;
});
installBtn.addEventListener("click", async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  await deferredInstall.userChoice;
  deferredInstall = null;
  installBtn.hidden = true;
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
}

/* ============================================================
   Boot
============================================================ */
(async function init() {
  loadState();
  try { await loadCustomCards(); } catch (e) { customCards = []; }
  // Drop references to photo cards that no longer exist
  Object.keys(state.slots).forEach((k) => {
    if (state.slots[k] && !findCard(state.slots[k])) state.slots[k] = null;
  });
  lockIcon.textContent = state.locked ? "🔒" : "🔓";
  lockBtn.setAttribute("aria-pressed", String(state.locked));
  render();
})();
</script>
</body>
</html>
